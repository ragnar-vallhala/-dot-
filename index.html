<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>. | second row, second seat</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;700&display=swap');

    :root {
      --bg-color: #0f172a;
      --card-bg: rgba(30, 41, 59, 0.7);
      --accent-primary: #38bdf8;
      --accent-secondary: #818cf8;
      --text-primary: #f1f5f9;
      --text-secondary: #94a3b8;
      --glass-border: rgba(255, 255, 255, 0.1);
      --font-serif: 'Playfair Display', serif;
      --font-body: 'Cormorant Garamond', serif;
      --font-display: 'Outfit', sans-serif;
      --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-primary);
      font-family: var(--font-body);
      line-height: 1.8;
      overflow-x: hidden;
      background-image:
        radial-gradient(circle at 10% 20%, rgba(56, 189, 248, 0.05) 0%, transparent 40%),
        radial-gradient(circle at 90% 80%, rgba(129, 140, 248, 0.05) 0%, transparent 40%);
      min-height: 100vh;
    }

    /* App Container */
    #app {
      max-width: 100vw;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Cover Page */
    #cover-page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 2rem;
      background: radial-gradient(circle at center, rgba(30, 41, 59, 0.5) 0%, var(--bg-color) 100%);
      position: relative;
      z-index: 10;
    }

    .book-title {
      font-size: 10rem;
      font-family: var(--font-serif);
      font-weight: 700;
      margin: 0;
      line-height: 1;
      background: linear-gradient(to bottom, var(--text-primary), var(--accent-primary));
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      filter: drop-shadow(0 0 20px rgba(56, 189, 248, 0.3));
      animation: fadeInDown 1.2s ease-out;
    }

    .book-subtitle {
      font-size: 1.5rem;
      font-family: var(--font-serif);
      font-style: italic;
      color: var(--text-secondary);
      margin-top: 1rem;
      letter-spacing: 0.2em;
      animation: fadeInUp 1.2s ease-out 0.2s both;
    }

    .book-author {
      font-size: 1.2rem;
      font-weight: 400;
      margin-top: 4rem;
      text-transform: uppercase;
      letter-spacing: 0.4em;
      color: var(--text-primary);
      animation: fadeInUp 1.2s ease-out 0.4s both;
    }

    .start-btn {
      margin-top: 5rem;
      padding: 1rem 3rem;
      background: transparent;
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: var(--transition);
      position: relative;
      overflow: hidden;
      animation: fadeIn 2s ease-out 0.8s both;
    }

    .start-btn:hover {
      background: var(--accent-primary);
      color: var(--bg-color);
      box-shadow: 0 0 40px rgba(56, 189, 248, 0.4);
    }

    /* Reader View */
    #reader-view {
      display: none;
      flex: 1;
      padding: 2rem;
      position: relative;
    }

    /* Navigation Sidebar (TOC) */
    #sidebar {
      position: fixed;
      left: 0;
      top: 0;
      width: 300px;
      height: 100vh;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border-right: 1px solid var(--glass-border);
      padding: 6rem 2rem 2rem 2rem;
      z-index: 100;
      transform: translateX(-100%);
      transition: var(--transition);
      box-shadow: 20px 0 50px rgba(0, 0, 0, 0.5);
      overflow-y: auto;
    }

    #sidebar.open {
      transform: translateX(0);
    }

    .toc-header {
      font-family: var(--font-display);
      font-size: 1.5rem;
      margin-bottom: 2rem;
      color: var(--accent-primary);
    }

    .toc-list {
      list-style: none;
    }

    .toc-item {
      margin-bottom: 1rem;
      cursor: pointer;
      color: var(--text-secondary);
      transition: var(--transition);
      padding: 0.5rem 1rem;
      border-radius: 8px;
    }

    .toc-item:hover,
    .toc-item.active {
      color: var(--accent-primary);
      background: rgba(56, 189, 248, 0.1);
      padding-left: 1.5rem;
      border-left: 2px solid var(--accent-primary);
    }

    /* Content Container */
    #content-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 4rem 1rem;
      animation: fadeIn 0.8s ease-out;
    }

    .chapter-title {
      font-family: var(--font-serif);
      font-size: 3rem;
      margin-bottom: 4rem;
      text-align: center;
    }

    .paragraph {
      font-size: 1.4rem;
      margin-bottom: 2.5rem;
      color: var(--text-primary);
      text-align: justify;
      opacity: 0.95;
      font-weight: 300;
      letter-spacing: 0.01em;
      hyphens: auto;
    }

    .dropcap {
      float: left;
      font-family: var(--font-serif);
      font-size: 5rem;
      line-height: 0.7;
      padding: 0.8rem 0.8rem 0 0;
      color: var(--accent-primary);
      font-weight: 700;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 1rem;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      padding: 0.8rem 1.5rem;
      border-radius: 50px;
      border: 1px solid var(--glass-border);
      z-index: 50;
    }

    .nav-btn {
      background: transparent;
      border: none;
      color: var(--text-secondary);
      cursor: pointer;
      font-family: var(--font-display);
      font-size: 0.9rem;
      transition: var(--transition);
    }

    .nav-btn:hover {
      color: var(--accent-primary);
    }

    .nav-btn:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    /* Menu Toggle */
    .menu-toggle {
      position: fixed;
      top: 2rem;
      left: 2rem;
      z-index: 110;
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      width: 50px;
      height: 50px;
      border-radius: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: var(--text-primary);
      transition: var(--transition);
    }

    .menu-toggle:hover {
      background: rgba(255, 255, 255, 0.1);
      transform: scale(1.05);
    }

    /* Animations */
    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    /* Scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }

    ::-webkit-scrollbar-track {
      background: var(--bg-color);
    }

    ::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-primary);
    }

    @media (max-width: 768px) {
      .book-title {
        font-size: 6rem;
      }

      .book-subtitle {
        font-size: 1.1rem;
      }

      #content-container {
        padding: 4rem 2rem;
      }

      .chapter-title {
        font-size: 2.2rem;
      }
    }
  </style>
</head>

<body>
  <div id="app">
    <!-- Menu Toggle -->
    <div class="menu-toggle" id="menu-toggle">
      <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="6" x2="21" y2="6"></line>
        <line x1="3" y1="18" x2="21" y2="18"></line>
      </svg>
    </div>

    <!-- TOC Sidebar -->
    <div id="sidebar">
      <h2 class="toc-header">Chapters</h2>
      <ul id="toc-list" class="toc-list">
        <!-- TOC items will be injected here -->
      </ul>
    </div>

    <!-- Cover Page -->
    <div id="cover-page">
      <h1 class="book-title">.</h1>
      <p class="book-subtitle">second row, second seat</p>
      <p class="book-author">Ashutosh Vishwakarma</p>
      <button class="start-btn" id="start-reading">START READING</button>
    </div>

    <!-- Reader View -->
    <div id="reader-view">
      <div id="content-container">
        <!-- Chapter content will be injected here -->
      </div>

      <!-- Bottom Navigation -->
      <div class="bottom-nav">
        <button class="nav-btn" id="prev-ch">PREVIOUS</button>
        <button class="nav-btn" id="next-ch">NEXT</button>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      let bookData = null;
      let currentChapterIndex = 0;

      const coverPage = document.getElementById('cover-page');
      const readerView = document.getElementById('reader-view');
      const contentContainer = document.getElementById('content-container');
      const tocList = document.getElementById('toc-list');
      const sidebar = document.getElementById('sidebar');
      const menuToggle = document.getElementById('menu-toggle');
      const hamburgerIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>`;
      const closeIcon = `<svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>`;

      // Buttons
      const startBtn = document.getElementById('start-reading');
      const nextBtn = document.getElementById('next-ch');
      const prevBtn = document.getElementById('prev-ch');

      // Fetch Book Data
      fetch('book_data.json')
        .then(response => response.json())
        .then(data => {
          bookData = data;
          init();
        })
        .catch(err => console.error('Error loading book data:', err));

      function init() {
        renderTOC();
      }

      function renderTOC() {
        tocList.innerHTML = '';
        bookData.chapters.forEach((chapter, index) => {
          const li = document.createElement('li');
          li.className = 'toc-item';
          li.textContent = `${index + 1}. ${chapter.title}`;
          li.onclick = () => {
            currentChapterIndex = index;
            showChapter(index);
            sidebar.classList.remove('open');
            menuToggle.innerHTML = hamburgerIcon;
          };
          tocList.appendChild(li);
        });
      }

      function showChapter(index) {
        const chapter = bookData.chapters[index];
        if (!chapter) return;

        // Update UI
        coverPage.style.display = 'none';
        readerView.style.display = 'flex';

        // Render content
        let html = `<h2 class="chapter-title">${chapter.title}</h2>`;
        chapter.paragraphs.forEach(para => {
          html += `<p class="paragraph">${para}</p>`;
        });

        contentContainer.innerHTML = html;
        window.scrollTo({ top: 0, behavior: 'smooth' });

        // Update buttons
        prevBtn.disabled = index === 0;
        nextBtn.disabled = index === bookData.chapters.length - 1;

        // Update active TOC item
        const items = document.querySelectorAll('.toc-item');
        items.forEach((item, i) => {
          if (i === index) item.classList.add('active');
          else item.classList.remove('active');
        });

        // Save progress (optional)
        localStorage.setItem('currentChapter', index);
      }

      // Event Listeners
      startBtn.addEventListener('click', () => {
        showChapter(0);
      });

      nextBtn.addEventListener('click', () => {
        if (currentChapterIndex < bookData.chapters.length - 1) {
          currentChapterIndex++;
          showChapter(currentChapterIndex);
        }
      });

      prevBtn.addEventListener('click', () => {
        if (currentChapterIndex > 0) {
          currentChapterIndex--;
          showChapter(currentChapterIndex);
        }
      });

      menuToggle.addEventListener('click', () => {
        sidebar.classList.toggle('open');
        menuToggle.innerHTML = sidebar.classList.contains('open') ? closeIcon : hamburgerIcon;
      });

      // Close sidebar when clicking outside
      document.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && !menuToggle.contains(e.target)) {
          sidebar.classList.remove('open');
          menuToggle.innerHTML = hamburgerIcon;
        }
      });
    });
  </script>
</body>

</html>
