<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>. | second row, second seat</title>
    <link rel="stylesheet" href="modern-style.css">
</head>

<body>
    <div id="app">
        <!-- Menu Toggle -->
        <div class="menu-toggle" id="menu-toggle">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="3" y1="12" x2="21" y2="12"></line>
                <line x1="3" y1="6" x2="21" y2="6"></line>
                <line x1="3" y1="18" x2="21" y2="18"></line>
            </svg>
        </div>

        <!-- TOC Sidebar -->
        <div id="sidebar">
            <h2 class="toc-header">Chapters</h2>
            <ul id="toc-list" class="toc-list">
                <!-- TOC items will be injected here -->
            </ul>
        </div>

        <!-- Cover Page -->
        <div id="cover-page">
            <h1 class="book-title">.</h1>
            <p class="book-subtitle">second row, second seat</p>
            <p class="book-author">Ashutosh Vishwakarma</p>
            <button class="start-btn" id="start-reading">START READING</button>
        </div>

        <!-- Reader View -->
        <div id="reader-view">
            <div id="content-container">
                <!-- Chapter content will be injected here -->
            </div>

            <!-- Bottom Navigation -->
            <div class="bottom-nav">
                <button class="nav-btn" id="prev-ch">PREVIOUS</button>
                <button class="nav-btn" id="next-ch">NEXT</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>

</html>
